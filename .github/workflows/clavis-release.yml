# SPDX-License-Identifier: GPL-2.0-or-later
# Clavis Desktop — release build (Linux AppImage + Windows installer + macOS dmg)
# Triggered by pushing a tag like `clavis-v3.18.0` (or run manually).
name: Clavis Release

on:
  push:
    tags:
      - 'clavis-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/use (e.g. clavis-v3.18.0)'
        required: true
        default: 'clavis-v0.0.0-dev'

permissions:
  contents: write

env:
  CLAVIS_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  prepare:
    name: Create GitHub release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ env.CLAVIS_TAG }}
    steps:
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${CLAVIS_TAG}" >/dev/null 2>&1; then
            echo "Release ${CLAVIS_TAG} already exists."
          else
            gh release create "${CLAVIS_TAG}" \
              --title "Clavis Desktop ${CLAVIS_TAG}" \
              --notes "Clavis Desktop client — đồng bộ tệp cho Clavis Cloud. Bản dựng tự động." \
              --latest
          fi

  linux:
    name: Linux AppImage
    needs: prepare
    runs-on: ubuntu-latest
    container: ghcr.io/nextcloud/continuous-integration-client-appimage-qt6:client-appimage-el8-6.10.2-4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Build AppImage
        id: build-appimage
        run: |
          BUILDNR=${GITHUB_RUN_ID} VERSION_SUFFIX=clavis BUILD_UPDATER=ON \
            DESKTOP_CLIENT_ROOT=`pwd` APPNAME=Clavis EXECUTABLE_NAME=clavis \
            QT_BASE_DIR=/root/linux-gcc-x86_64 \
            /bin/bash -c "./admin/linux/build-appimage.sh"

      - name: Upload AppImage to release
        # The el8 AppImage container has no `gh`, so upload via the REST API.
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          ASSET="${{ steps.build-appimage.outputs.APPIMAGE_NAME }}"
          cp "${ASSET}" "Clavis-x86_64.AppImage"
          REL_ID=$(curl -s -H "Authorization: token ${TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/tags/${TAG}" | grep -m1 '"id":' | grep -oE '[0-9]+')
          echo "Release id: ${REL_ID}"
          curl -s -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"Clavis-x86_64.AppImage" \
            "https://uploads.github.com/repos/${REPO}/releases/${REL_ID}/assets?name=Clavis-x86_64.AppImage" \
            | grep -E '"name"|"message"' | head -2

  windows:
    name: Windows installer
    needs: prepare
    runs-on: windows-2022
    env:
      CRAFT_TARGET: windows-msvc2022_64-cl
      CRAFT_MASTER_LOCATION: ${{ github.workspace }}\CraftMaster
      CRAFT_MASTER_CONFIG: ${{ github.workspace }}\craftmaster.ini
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Craft + dependencies
        shell: pwsh
        run: |
          & cmd /C "git clone -q --depth=1 https://invent.kde.org/packaging/craftmaster.git ${{ env.CRAFT_MASTER_LOCATION }} 2>&1"
          function craft() {
              python "${{ env.CRAFT_MASTER_LOCATION }}\CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c $args
              if($LASTEXITCODE -ne 0) {exit $LASTEXITCODE}
          }
          craft --add-blueprint-repository "https://github.com/nextcloud/craft-blueprints-kde.git|stable-34.0|"
          craft --add-blueprint-repository "https://github.com/nextcloud/craft-blueprints-nextcloud.git|stable-34.0|"
          craft craft
          craft --install-deps nextcloud-client

      - name: Install inkscape
        shell: pwsh
        run: choco install inkscape -y

      - name: Compile + package
        shell: pwsh
        run: |
          function craft() {
              python "${{ env.CRAFT_MASTER_LOCATION }}\CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c $args
              if($LASTEXITCODE -ne 0) {exit $LASTEXITCODE}
          }
          craft --src-dir ${{ github.workspace }} nextcloud-client
          # Work around an upstream blueprint bug: nextcloud-client.py uses `os`
          # without importing it, crashing craft --package. Prepend the import.
          $bp = "${{ github.workspace }}\${{ env.CRAFT_TARGET }}\etc\blueprints\locations\craft-blueprints-nextcloud\nextcloud-client\nextcloud-client.py"
          if (Test-Path $bp) {
            $c = Get-Content $bp -Raw
            if ($c -notmatch '(?m)^\s*import os\s*$') { Set-Content -Path $bp -Value ("import os`r`n" + $c) }
            Write-Host "Patched blueprint: $bp"
          } else { Write-Host "Blueprint not found at $bp" }
          craft --src-dir ${{ github.workspace }} --package nextcloud-client

      - name: Locate + upload installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          Write-Host "Searching for produced installers..."
          $exes = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Include *.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.Length -gt 10MB -and $_.FullName -notmatch '\\build\\' -and $_.FullName -notmatch '\\bin\\' }
          $exes | ForEach-Object { Write-Host ("FOUND: {0} ({1:N0} bytes)" -f $_.FullName, $_.Length) }
          $installer = $exes | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $installer) { Write-Error "No installer .exe found"; exit 1 }
          $dest = "Clavis-Setup-x64.exe"
          Copy-Item $installer.FullName $dest
          gh release upload "${{ needs.prepare.outputs.tag }}" $dest --clobber

  macos:
    name: macOS dmg (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            target: macos-clang-arm64
            xcode: /Applications/Xcode_16.3.app/Contents/Developer
          - arch: x86_64
            runner: macos-13
            target: macos-64-clang
            xcode: ''
    env:
      CRAFT_TARGET: ${{ matrix.target }}
      CRAFT_MASTER_LOCATION: ${{ github.workspace }}/CraftMaster
      CRAFT_MASTER_CONFIG: ${{ github.workspace }}/craftmaster.ini
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Select Xcode
        if: matrix.xcode != ''
        run: sudo xcode-select -s ${{ matrix.xcode }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Homebrew dependencies
        run: brew install homebrew/cask/inkscape

      - name: Install Craft + dependencies
        run: |
          git clone -q --depth=1 https://invent.kde.org/packaging/craftmaster.git "${CRAFT_MASTER_LOCATION}"
          craft() { python "${CRAFT_MASTER_LOCATION}/CraftMaster.py" --config "${CRAFT_MASTER_CONFIG}" --target "${CRAFT_TARGET}" -c "$@"; }
          craft --add-blueprint-repository "https://github.com/nextcloud/craft-blueprints-kde.git|stable-34.0|"
          craft --add-blueprint-repository "https://github.com/nextcloud/craft-blueprints-nextcloud.git|stable-34.0|"
          craft craft
          craft --install-deps nextcloud-client

      - name: Compile
        # Only build: craft's `--package` step hits an upstream blueprint bug
        # (nextcloud-client.py uses `os` without importing it). We build the
        # .app (macdeployqt runs as a post-build step) and package it ourselves.
        run: |
          craft() { python "${CRAFT_MASTER_LOCATION}/CraftMaster.py" --config "${CRAFT_MASTER_CONFIG}" --target "${CRAFT_TARGET}" -c "$@"; }
          craft --src-dir "${{ github.workspace }}" nextcloud-client

      - name: Package dmg + upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "Searching for Clavis.app..."
          APP=$(find "${{ github.workspace }}/${CRAFT_TARGET}" -type d -name 'Clavis.app' 2>/dev/null | head -1)
          echo "App: ${APP}"
          if [ -z "$APP" ]; then echo "Clavis.app not found"; exit 1; fi
          STAGE="$RUNNER_TEMP/dmgroot"
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          DMG="Clavis-${{ matrix.arch }}.dmg"
          hdiutil create -volname "Clavis" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          gh release upload "${{ needs.prepare.outputs.tag }}" "$DMG" --clobber
